# Nova AI Avatar — Home Assistant Package
# Save this file as /config/packages/nova.yaml
# Replace <SERVER_IP>, <PORT>, and <API_KEY> with your actual values.
# Add to configuration.yaml:  homeassistant: packages: !include_dir_named packages/

rest_command:
  nova_announce:
    url: "http://<SERVER_IP>:<PORT>/announce"
    method: POST
    content_type: "application/json"
    headers:
      X-API-Key: "<API_KEY>"
    payload: '{"message": "{{ message }}", "priority": "{{ priority | default(\"normal\") }}"}'
  nova_visual_event:
    url: "http://<SERVER_IP>:<PORT>/announce/visual"
    method: POST
    content_type: "application/json"
    headers:
      X-API-Key: "<API_KEY>"
    payload: >-
      {"event": {{ event | tojson }},
      "title": {{ title | default('', true) | tojson }},
      "message": {{ message | default('', true) | tojson }},
      "image_urls_csv": {{ image_urls_csv | default('', true) | tojson }},
      "expires_in_ms": {{ expires_in_ms | default(30000, true) }}}
  nova_package_event:
    url: "http://<SERVER_IP>:<PORT>/announce/package"
    method: POST
    content_type: "application/json"
    headers:
      X-API-Key: "<API_KEY>"
    payload: >-
      {"camera_entity_id": {{ camera_entity_id | default('', true) | tojson }},
      "trigger_entity_id": {{ trigger_entity_id | default('binary_sensor.reolink_video_doorbell_poe_package', true) | tojson }},
      "location": {{ location | default('front door', true) | tojson }},
      "title": {{ title | default('Package Delivery', true) | tojson }},
      "message": {{ message | default('A package was delivered.', true) | tojson }}}
