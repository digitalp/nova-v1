<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — AI Avatar</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "talkinghead":   "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.4/modules/talkinghead.mjs"
    }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080d16; color: #f0f4f8;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }

    #avatar-container {
      flex: 1; position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #0d1f35 0%, #080d16 70%);
    }

    /* ── Tap-to-start gate ── */
    #start-gate {
      position: absolute; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      background: #080d16;
    }
    #start-gate.hidden { display: none; }
    #start-gate h2 { font-size: 2rem; font-weight: 800; color: #67e8f9; letter-spacing: 0.1em; }
    #start-gate p  { font-size: 0.9rem; color: #64748b; }
    #btn-start {
      padding: 14px 44px; border-radius: 30px;
      background: linear-gradient(135deg, #6366f1, #0891B2);
      border: none; color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 24px rgba(99,102,241,0.35);
      transition: transform 0.12s;
    }
    #btn-start:hover { transform: translateY(-2px); }

    /* ── Audio-unlock banner (autostart mode) ── */
    #audio-unlock-banner {
      display: none;
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.88);
      backdrop-filter: blur(10px);
      color: #67e8f9;
      padding: 10px 22px;
      border-radius: 28px;
      font-size: 14px;
      font-family: inherit;
      z-index: 100;
      cursor: pointer;
      border: 1px solid rgba(103,232,249,.35);
      white-space: nowrap;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Loading ── */
    #loading-overlay {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: #080d16; z-index: 20; transition: opacity 0.6s;
    }
    #loading-overlay.show { display: flex; }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid rgba(8,145,178,0.2); border-top-color: #0891B2;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: #64748b; font-size: 0.9rem; }

    /* ── Overlays ── */
    #name-badge {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(160deg, rgba(220,232,248,.8), rgba(235,242,255,.75));
      backdrop-filter: blur(50px) saturate(1.4);
      -webkit-backdrop-filter: blur(50px) saturate(1.4);
      border: 1px solid rgba(255,255,255,.6); border-radius: 20px;
      padding: 6px 20px; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #1a1a2e; z-index: 5;
      box-shadow: 0 4px 16px rgba(100,130,180,.1);
      font-family: 'Roboto', sans-serif;
    }
    #wake-pill {
      position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(160deg, rgba(220,232,248,.7), rgba(235,242,255,.65));
      backdrop-filter: blur(40px) saturate(1.4);
      -webkit-backdrop-filter: blur(40px) saturate(1.4);
      border: 1px solid rgba(180,200,240,.4); border-radius: 14px;
      padding: 4px 16px; font-size: 0.73rem; color: #5a6a80; z-index: 5;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
      font-family: 'Roboto', sans-serif;
    }
    #wake-pill.on { opacity: 1; }
    #energy-wrap {
      position: absolute; top: 84px; left: 50%; transform: translateX(-50%);
      width: 140px; height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 2px; z-index: 5; opacity: 0; transition: opacity 0.3s;
    }
    #energy-wrap.on { opacity: 1; }
    #energy-fill {
      height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #38bdf8); transition: width 0.08s;
    }
    #energy-fill.speaking { background: linear-gradient(90deg, #10b981, #38bdf8); }
    #waveform-canvas {
      position: absolute; top: 78px; left: 50%; transform: translateX(-50%);
      width: 180px; height: 32px; z-index: 5;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #waveform-canvas.on { opacity: 1; }
    #wake-flash {
      position: absolute; inset: 0; z-index: 6; pointer-events: none;
      background: rgba(99,102,241,0.2); opacity: 0; transition: opacity 0.12s;
    }
    #wake-flash.on { opacity: 1; }
    #state-ring {
      position: absolute; inset: 0; pointer-events: none; z-index: 4;
      transition: box-shadow 0.4s;
    }
    #state-ring.listening { box-shadow: inset 0 0 40px rgba(96,165,250,0.3); }
    #state-ring.thinking  { box-shadow: inset 0 0 40px rgba(251,191,36,0.22); }
    #state-ring.speaking  { box-shadow: inset 0 0 40px rgba(52,211,153,0.22); }
    #state-ring.alert     { box-shadow: inset 0 0 40px rgba(248,113,113,0.3); }
    #subtitle {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      max-width: 85%;
      background: linear-gradient(160deg, rgba(220,232,248,.82), rgba(235,242,255,.78));
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(50px) saturate(1.4);
      -webkit-backdrop-filter: blur(50px) saturate(1.4);
      border-radius: 16px; padding: 10px 18px; font-size: 0.88rem; line-height: 1.5;
      text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 5;
      box-shadow: 0 4px 16px rgba(100,130,180,.1);
      color: #1a1a2e;
      font-family: 'Roboto', sans-serif;
    }
    #subtitle.on { opacity: 1; }

    /* ── Event Popup — Light Frosted Glass ────────────────────────────── */
    #event-popup {
      position: absolute; bottom: 88px; left: 20px; z-index: 8;
      width: min(38vw, 380px);
      background: linear-gradient(160deg,
        rgba(220, 232, 248, .82) 0%,
        rgba(235, 242, 255, .78) 50%,
        rgba(225, 236, 252, .80) 100%
      );
      border: 1px solid rgba(255,255,255,.6);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(100,130,180,.12), 0 2px 6px rgba(0,0,0,.04);
      backdrop-filter: blur(50px) saturate(1.4);
      -webkit-backdrop-filter: blur(50px) saturate(1.4);
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px) scale(.95);
      transition:
        opacity .35s cubic-bezier(.22,1,.36,1),
        transform .35s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
    }
    #event-popup.on {
      opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
    }
    #event-popup.alert-pulse {
      border-color: rgba(220,80,60,.25);
      box-shadow: 0 8px 32px rgba(100,130,180,.12), 0 0 30px rgba(220,80,60,.08);
      animation: popup-glow 2.8s ease-in-out infinite;
    }
    @keyframes popup-glow {
      0%, 100% { box-shadow: 0 8px 32px rgba(100,130,180,.12), 0 0 20px rgba(220,80,60,.05); }
      50%      { box-shadow: 0 8px 32px rgba(100,130,180,.12), 0 0 40px rgba(220,80,60,.1); }
    }
    #event-popup-timer {
      height: 3px; width: 100%;
      background: linear-gradient(90deg, #3b82f6, rgba(96,165,250,.4));
      transition: width linear;
      border-radius: 0 0 2px 2px;
    }
    #event-popup.alert-pulse #event-popup-timer {
      background: linear-gradient(90deg, #ef4444, rgba(251,146,60,.5));
    }
    #event-popup-head {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 18px 12px;
    }
    #event-popup-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px;
      background: rgba(180, 210, 250, .35);
      border: 1px solid rgba(180, 210, 245, .25);
    }
    #event-popup-icon svg {
      width: 18px; height: 18px;
      stroke: #5a7aa8; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
    #event-popup.alert-pulse #event-popup-icon {
      background: rgba(240,80,60,.12);
      border-color: rgba(240,80,60,.2);
    }
    #event-popup.alert-pulse #event-popup-icon svg { stroke: #dc2626; }
    #event-popup-title {
      flex: 1; font-size: .95rem; font-weight: 500; letter-spacing: -.01em;
      color: #1a1a2e;
      font-family: 'Roboto', sans-serif;
    }
    #event-popup-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(180, 210, 245, .3); border-radius: 50%;
      background: rgba(200, 220, 248, .3); color: #5a6a80;
      cursor: pointer; font-size: 1.05rem; line-height: 1;
      transition: all .15s;
    }
    #event-popup-close:hover {
      background: rgba(180, 210, 250, .45);
      color: #2d3748;
    }
    #event-popup-msg {
      padding: 0 18px 14px; color: #5a6a80;
      font-size: .84rem; line-height: 1.5;
      font-family: 'Roboto', sans-serif;
    }
    #event-popup-note {
      display: none; padding: 0 18px 8px;
      color: #6b7b95; font-size: .76rem; line-height: 1.35;
      font-style: italic;
    }
    #event-popup-note.on { display: block; }
    #event-popup-actions { display: none; padding: 4px 18px 8px; }
    #event-popup-actions.on {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .event-action-btn, .event-confirm-btn, .event-confirm-cancel {
      width: 100%; border: 1px solid rgba(180, 210, 245, .3);
      background: rgba(200, 220, 248, .28); color: #2d3748;
      border-radius: 14px; padding: 10px 12px;
      font-size: .8rem; font-weight: 500; cursor: pointer;
      transition: all .15s;
      font-family: 'Roboto', sans-serif;
    }
    .event-action-btn:hover {
      background: rgba(180, 210, 250, .4);
    }
    .event-action-btn.warn {
      background: rgba(251,191,36,.12);
      border-color: rgba(251,191,36,.25);
      color: #92400e;
    }
    .event-action-btn.warn:hover {
      background: rgba(251,191,36,.2);
    }
    .event-action-btn.success {
      background: rgba(34,197,94,.1);
      border-color: rgba(34,197,94,.2);
      color: #166534;
    }
    .event-action-btn.success:hover { background: rgba(34,197,94,.18); }
    .event-action-btn.quiet, .event-confirm-cancel {
      background: rgba(200, 220, 248, .15);
      border-color: rgba(180, 210, 245, .15);
      color: #6b7b95;
    }
    .event-action-btn:disabled, .event-confirm-btn:disabled, .event-confirm-cancel:disabled {
      opacity: .35; cursor: default;
    }
    .event-popup-confirm {
      display: grid; gap: 8px;
      background: rgba(200, 220, 248, .2);
      border: 1px solid rgba(180, 210, 245, .2);
      border-radius: 14px; padding: 14px;
    }
    .event-popup-confirm-text { color: #5a6a80; font-size: .78rem; line-height: 1.45; }
    .event-popup-confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #event-popup-feed {
      display: none;
      width: calc(100% - 36px); margin: 4px 18px 18px;
      aspect-ratio: 16 / 9; object-fit: cover;
      border-radius: 16px;
      background: rgba(0,0,0,.06);
      border: 1px solid rgba(180, 210, 245, .25);
      box-shadow: 0 2px 8px rgba(100,130,180,.08);
    }
    #event-popup-gallery {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 8px; padding: 8px 18px 18px;
    }
    .event-popup-art {
      display: flex; align-items: center; justify-content: center;
      min-height: 100px; padding: 8px; border-radius: 14px;
      background: rgba(0,0,0,.15);
      border: 1px solid rgba(255,255,255,.06);
    }
    .event-popup-art img { width: 100%; max-height: 110px; object-fit: contain; }

    /* ── Recent Events — Light Frosted Glass ─────────────────────────── */
    #event-recent {
      position: absolute; top: 20px; right: 20px; z-index: 7;
      width: min(24vw, 260px);
      display: none; flex-direction: column;
      border-radius: 20px;
      background: linear-gradient(160deg,
        rgba(220,232,248,.8) 0%,
        rgba(235,242,255,.75) 100%
      );
      border: 1px solid rgba(255,255,255,.6);
      font-family: 'Roboto', sans-serif;
      box-shadow:
        0 8px 32px rgba(0,0,0,.2),
        inset 0 1px 0 rgba(255,255,255,.08);
      backdrop-filter: blur(60px) saturate(1.8) brightness(1.05);
      -webkit-backdrop-filter: blur(60px) saturate(1.8) brightness(1.05);
      overflow: hidden;
      max-height: calc(100dvh - 130px);
    }
    #event-recent.on { display: flex; }
    #event-recent-title {
      font-size: .65rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
      padding: 14px 16px 6px;
    }
    #event-recent-list {
      display: flex; flex-direction: column;
      overflow-y: auto; max-height: calc(100dvh - 190px);
      padding: 4px 8px 8px; gap: 2px;
    }
    .event-recent-item { display: flex; flex-direction: column; }
    .event-recent-btn {
      display: flex; align-items: flex-start; gap: 10px;
      width: 100%; text-align: left; cursor: pointer;
      padding: 10px; border: none; border-radius: 12px;
      background: transparent; color: rgba(255,255,255,.88);
      transition: background .15s;
    }
    .event-recent-btn:hover { background: rgba(255,255,255,.06); }
    .event-recent-btn.active { background: rgba(10,132,255,.1); }
    .event-recent-icon {
      flex-shrink: 0; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; background: rgba(255,255,255,.1);
    }
    .event-recent-icon svg { width: 14px; height: 14px; stroke: rgba(255,255,255,.5); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .event-recent-icon.alert { background: rgba(255,69,58,.12); }
    .event-recent-icon.alert svg { stroke: #ff453a; }
    .event-recent-icon.success { background: rgba(48,209,88,.1); }
    .event-recent-icon.success svg { stroke: #30d158; }
    .event-recent-content { flex: 1; min-width: 0; }
    .event-recent-name {
      font-size: .78rem; font-weight: 600; line-height: 1.25;
      color: rgba(255,255,255,.88);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-recent-msg {
      font-size: .7rem; color: rgba(255,255,255,.4); line-height: 1.3;
      margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .event-recent-note {
      font-size: .65rem; color: rgba(10,132,255,.7); line-height: 1.2; margin-top: 2px;
    }
    .event-recent-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .event-recent-time { font-size: .62rem; color: rgba(255,255,255,.25); }
    .event-recent-status {
      padding: 1px 6px; border-radius: 4px;
      font-size: .58rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: rgba(10,132,255,.9); background: rgba(10,132,255,.12);
    }
    .event-recent-status.dismissed { color: rgba(255,255,255,.3); background: rgba(255,255,255,.05); }
    .event-recent-status.acknowledged { color: rgba(255,214,10,.85); background: rgba(255,214,10,.1); }
    .event-recent-status.snoozed { color: rgba(255,159,10,.8); background: rgba(255,159,10,.1); }
    .event-recent-status.resolved { color: rgba(48,209,88,.85); background: rgba(48,209,88,.1); }
    .event-recent-actions {
      display: flex; gap: 4px; padding: 2px 10px 6px; justify-content: flex-end;
    }
    .event-recent-action {
      cursor: pointer; padding: 3px 8px; border-radius: 6px;
      border: none; background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.5); font-size: .62rem; font-weight: 500;
      transition: background .12s;
    }
    .event-recent-action:hover { background: rgba(255,255,255,.12); color: rgba(255,255,255,.75); }
    .event-recent-action.warn { color: rgba(255,159,10,.8); }
    .event-recent-action.success { color: rgba(48,209,88,.8); }
    .event-recent-confirm {
      display: grid; gap: 6px; margin-top: 6px; padding: 10px;
      border-radius: 12px; background: rgba(255,255,255,.04);
    }
    .event-recent-confirm-text { color: rgba(255,255,255,.7); font-size: .74rem; line-height: 1.4; }
    .event-recent-confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    /* ── Bottom bar — Light Frosted Glass ── */
    #bottom-bar {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      background: linear-gradient(180deg, rgba(225,236,252,.75), rgba(220,232,248,.8));
      border-top: 1px solid rgba(255,255,255,.5);
      backdrop-filter: blur(50px) saturate(1.4);
      -webkit-backdrop-filter: blur(50px) saturate(1.4);
      font-family: 'Roboto', sans-serif;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #374151;
      flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s;
    }
    .dot-online  { background: #10b981 !important; box-shadow: 0 0 6px #10b981; }
    .dot-waking  { background: #6366f1 !important; animation: pw 1.8s ease-in-out infinite; }
    .dot-speech  { background: #38bdf8 !important; box-shadow: 0 0 8px #38bdf8; }
    .dot-recding { background: #ef4444 !important; box-shadow: 0 0 8px #ef4444; }
    @keyframes pw { 0%,100%{ box-shadow: 0 0 3px #6366f1; } 50%{ box-shadow: 0 0 10px #6366f1; } }
    #status-text { flex: 1; font-size: 0.82rem; color: #5a6a80; font-family: 'Roboto', sans-serif; }
    #btn-mic {
      padding: 9px 22px; border-radius: 22px;
      border: 1px solid rgba(180,210,245,.3); background: rgba(200,220,248,.3);
      color: #2d3748; font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s; user-select: none; touch-action: none;
      font-family: 'Roboto', sans-serif;
    }
    #btn-mic.rec {
      background: linear-gradient(135deg,#ef4444,#dc2626);
      border-color: transparent; box-shadow: 0 2px 14px rgba(239,68,68,0.5);
    }
    #btn-mic:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      #start-gate h2 { font-size: 1.5rem; }
      #start-gate p  { font-size: 0.82rem; }
      #btn-start     { padding: 12px 32px; font-size: 0.95rem; }
      #btn-mic       { padding: 10px 18px; font-size: 0.84rem; }
      #status-text   { font-size: 0.75rem; }
      #subtitle      { font-size: 0.82rem; max-width: 92%; padding: 7px 12px; }
      #event-popup   { bottom: 72px; left: 10px; width: min(55vw, 260px); border-radius: 16px; }
      #event-recent  { top: 12px; right: 10px; width: min(42vw, 200px); border-radius: 14px; }
      #event-popup-title { font-size: .78rem; }
      #event-popup-msg { font-size: .78rem; }
      #name-badge    { font-size: 0.78rem; padding: 3px 12px; }
      #bottom-bar    { gap: 8px; padding: 8px 12px; }
    }

    /* Landscape phone — shrink bottom bar so avatar gets more vertical space */
    @media (max-height: 500px) and (orientation: landscape) {
      #bottom-bar { padding: 5px 14px; }
      #btn-mic    { padding: 7px 16px; font-size: 0.82rem; }
      #status-text { font-size: 0.72rem; }
    }



    /* ── Weather Card — Dribbble Exact Match ──────────────────────────── */
    #weather-card {
      position: absolute; top: 50%; right: 20px; left: auto; z-index: 5;
      transform: translateY(-50%);
      width: min(32vw, 300px);
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity .5s cubic-bezier(.4,0,.2,1), transform .4s cubic-bezier(.4,0,.2,1);
      font-family: 'Roboto', sans-serif;
    }
    #weather-card.on { opacity: 1; }
    #weather-card.hidden-by-event {
      opacity: 0 !important;
      transform: translateY(-50%) translateX(20px);
      transition: opacity .25s, transform .25s;
    }

    /* Main glass card — light frosted, blue-tinted like the reference */
    .wc-glass {
      background: linear-gradient(160deg,
        rgba(220, 232, 248, .82) 0%,
        rgba(235, 242, 255, .78) 50%,
        rgba(225, 236, 252, .80) 100%
      );
      border: 1px solid rgba(255,255,255,.6);
      backdrop-filter: blur(50px) saturate(1.4);
      -webkit-backdrop-filter: blur(50px) saturate(1.4);
      box-shadow: 0 8px 32px rgba(100,130,180,.12), 0 2px 6px rgba(0,0,0,.04);

    /* Stat chips — equal width, light blue tint, matching reference */

</head>

<script type="module">
import { TalkingHead } from 'talkinghead';

// ── Config ──────────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
let API_KEY = params.get('api_key') || '';
const SESSION = params.get('session_id') || 'avatar';
const ROOM    = (params.get('room') || '').trim().toLowerCase();
const SERVER  = (params.get('server') || location.origin).replace(/\/$/, '');

// If api_key in URL: save to HttpOnly cookie via server + localStorage, strip from URL
if (API_KEY) {
  localStorage.setItem('nova_api_key', API_KEY);
  fetch(SERVER + '/auth/set-cookie', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({api_key:API_KEY}), credentials:'include'}).catch(()=>{});
  params.delete('api_key');
  const qs = params.toString();
  history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
}

// API key resolved from: URL param → localStorage → admin session
if (!API_KEY) API_KEY = localStorage.getItem('nova_api_key') || '';

async function _resolveApiKey() {
  if (API_KEY) return;
  API_KEY = localStorage.getItem('nova_api_key') || '';
  if (API_KEY) return;
  try {
    const r = await fetch(SERVER + '/admin/api-key', {credentials:'include'});
    if (r.ok) { const d = await r.json(); if (d && d.api_key) { API_KEY = d.api_key; localStorage.setItem('nova_api_key', API_KEY); } }
  } catch {}
}
const WS_BASE = SERVER.replace(/^http/, 'ws') + `/ws/voice?session_id=${encodeURIComponent(SESSION)}`
  + (ROOM ? `&room=${encodeURIComponent(ROOM)}` : '');
function _avatarClientMetadata() {
  const ua = navigator.userAgent || '';
  const platform = navigator.userAgentData?.platform || navigator.platform || '';
  const host = location.hostname || '';
  const label = params.get('host_label') || host || platform || 'unknown';
  return {
    host,
    host_label: label,
    page_url: location.href,
    platform,
    user_agent: ua,
    screen: `${window.screen?.width || 0}x${window.screen?.height || 0}`,
    language: navigator.language || '',
  };
}
let AVATAR_URL = `${SERVER}/static/avatars/brunette.glb`;
let _skinToneIndex = 0;

// Three.js material color per skin tone index (0=Porcelain … 4=Deep).
// Applied as material.color on skin meshes only (Wolf3D_Skin, Wolf3D_Body).
// material.color acts as a multiplier on top of the texture in MeshStandardMaterial.
const SKIN_TONE_COLORS = [
  0xfdebd0,  // 0 Porcelain
  0xf1c27d,  // 1 Light
  0xd4a574,  // 2 Warm Beige
  0xc68642,  // 3 Medium
  0xa0622e,  // 4 Caramel
  0x8d5524,  // 5 Brown
  0x6b3a1f,  // 6 Dark Brown
  0x4a2c0a,  // 7 Deep
  0x3b1e08,  // 8 Espresso
  0x2d1606,  // 9 Ebony
];

// Material names that correspond to skin in common avatar formats
const SKIN_MATERIAL_NAMES = new Set([
  'Wolf3D_Skin', 'Wolf3D_Body',                    // Ready Player Me
  'Skin', 'Body', 'skin', 'body',                  // Generic
  'AvaturnSkin', 'avaturn_skin', 'Avaturn_Skin',   // Avaturn
  'Head', 'head', 'Face', 'face', 'Hands', 'hands', 'Arms', 'arms',
]);

// Fallback: if no named materials match, detect skin by texture/color heuristic
function _detectSkinMaterials(scene) {
  const found = new Set();
  scene.traverse(obj => {
    if (!obj.isMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(mat => {
      if (!mat) return;
      // Match by name
      if (SKIN_MATERIAL_NAMES.has(mat.name)) { found.add(mat.name); return; }
      // Match by partial name (case-insensitive)
      const lower = (mat.name || '').toLowerCase();
      if (lower.includes('skin') || lower.includes('body') || lower.includes('head') || lower.includes('face')) {
        found.add(mat.name);
      }
    });
  });
  return found;
}

let _resolvedSkinMaterials = null;

// ── Hair colour ──────────────────────────────────────────────────────────────
let _hairColorIndex = 0;
const HAIR_COLOR_VALUES = [
  0x1a1a1a,  // 0 Black
  0x3b2314,  // 1 Dark Brown
  0x6a4420,  // 2 Brown
  0x8b3a1a,  // 3 Auburn
  0xa52a2a,  // 4 Red
  0xc45c28,  // 5 Ginger
  0xc8a951,  // 6 Blonde
  0xe8dcc8,  // 7 Platinum
  0x9e9e9e,  // 8 Grey
  0xe8e8e8,  // 9 White
];

const HAIR_MATERIAL_NAMES = new Set([
  'Wolf3D_Hair', 'Hair', 'hair', 'Wolf3D_Headwear',
  'AvaturnHair', 'avaturn_hair', 'Avaturn_Hair',
]);

let _resolvedHairMaterials = null;

function _detectHairMaterials(scene) {
  const found = new Set();
  scene.traverse(obj => {
    if (!obj.isMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(mat => {
      if (!mat) return;
      if (HAIR_MATERIAL_NAMES.has(mat.name)) { found.add(mat.name); return; }
      const lower = (mat.name || '').toLowerCase();
      if (lower.includes('hair')) found.add(mat.name);
    });
  });
  return found;
}

function applyHairColor() {
  if (!head?.scene || _hairColorIndex < 0) return;
  if (!_resolvedHairMaterials) {
    _resolvedHairMaterials = _detectHairMaterials(head.scene);
    if (_resolvedHairMaterials.size === 0) return;
  }
  const color = HAIR_COLOR_VALUES[_hairColorIndex] ?? HAIR_COLOR_VALUES[0];
  head.scene.traverse(obj => {
    if (!obj.isMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(mat => {
      if (mat && _resolvedHairMaterials.has(mat.name)) {
        mat.color.setHex(color);
        mat.needsUpdate = true;
      }
    });
  });
}

function applySkinTone() {
  if (!head?.scene || _skinToneIndex < 0) return;
  // Resolve skin materials once per model
  if (!_resolvedSkinMaterials) {
    _resolvedSkinMaterials = _detectSkinMaterials(head.scene);
    if (_resolvedSkinMaterials.size === 0) {
      console.warn('No skin materials detected in model — skin tone adjustment unavailable');
      return;
    }
    console.log('Skin materials detected:', [..._resolvedSkinMaterials]);
  }
  const color = SKIN_TONE_COLORS[_skinToneIndex] ?? SKIN_TONE_COLORS[0];
  head.scene.traverse(obj => {
    if (!obj.isMesh) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    mats.forEach(mat => {
      if (mat && _resolvedSkinMaterials.has(mat.name)) {
        mat.color.setHex(color);
        mat.needsUpdate = true;
      }
    });
  });
}

// ── VAD config ───────────────────────────────────────────────────────────────
const VAD_THRESHOLD  = 0.030;  // RMS energy — above = speech (raised from 0.012 to filter ambient noise)
const VAD_SILENCE_MS = 1800;   // stop after this much post-speech silence
const VAD_MIN_MS     = 400;    // don't send clips shorter than this
const VAD_MAX_MS     = 14000;  // hard cap
const WAKE_VAD_MIN_ROLLING_CHUNKS = 4;   // ~800 ms before asking server to check wake word
const WAKE_VAD_SPEECH_DEBOUNCE = 5;      // ~400 ms sustained energy before wake check
const WAKE_VAD_FALSE_CHECK_COOLDOWN_MS = 800;

// ── DOM ──────────────────────────────────────────────────────────────────────
const $gate      = document.getElementById('start-gate');
const $btnStart  = document.getElementById('btn-start');
const $overlay   = document.getElementById('loading-overlay');
const $loadText  = document.getElementById('loading-text');
const $dot       = document.getElementById('status-dot');
const $statusTxt = document.getElementById('status-text');
const $btnMic    = document.getElementById('btn-mic');
const $ring      = document.getElementById('state-ring');
const $pill      = document.getElementById('wake-pill');
const $ew        = document.getElementById('energy-wrap');
const $ef        = document.getElementById('energy-fill');
const $flash     = document.getElementById('wake-flash');
const $sub       = document.getElementById('subtitle');
const $eventPopup = document.getElementById('event-popup');
const $eventPopupTitle = document.getElementById('event-popup-title');
const $eventPopupMsg = document.getElementById('event-popup-msg');
const $eventPopupNote = document.getElementById('event-popup-note');
const $eventPopupActions = document.getElementById('event-popup-actions');
const $eventPopupFeed = document.getElementById('event-popup-feed');
const $eventPopupGallery = document.getElementById('event-popup-gallery');
const $eventPopupClose = document.getElementById('event-popup-close');
const $eventRecent = document.getElementById('event-recent');
const $eventRecentList = document.getElementById('event-recent-list');

// ── State ────────────────────────────────────────────────────────────────────
let head              = null;
let ws                = null;
let audioCtx          = null;
let wsReady           = false;
let currentPlaybackSource = null;
let progressivePlaybackSources = [];
let progressivePlaybackCursor = 0;
let progressiveHeadSegments = [];
let progressiveHeadDrainPromise = null;
const HEAD_PROGRESSIVE_SEGMENT_MS = 180;
let pendingWordTimings = null;  // word timings arriving just before audio
let pendingWordTimingsTurnId = null;
let pendingAudioTurnId = null;
let currentPlaybackTurnId = null;
let serverVoiceCapabilities = { input_streaming: false, output_streaming: false, turn_context: false };
let activeOutputStream = null;
let activeEventId = null;
let latestSurfaceState = null;
let pendingSurfaceConfirmation = null;
let pendingTurnContext = null;
let reconnectDelay = 1000;
let _pingInterval  = null;
let handledServerRestart = false;
let isBusy         = false;    // Nova is thinking/speaking
let visualEventTimer = null;

// Recording state
let recording      = false;
let lastResponseWasQuestion = false;  // auto-mic after Nova asks a question
let mediaRec       = null;

// ── Webcam face recognition state ────────────────────────────────────────────
let webcamStream = null;
let webcamVideo  = null;
let lastRecognizedName = null;
let _faceRecogCooldownUntil = 0;  // avoid spamming face recognition
let _pendingFaceRecog = null;     // promise from captureAndRecognizeFace()

async function initWebcam() {
  try {
    webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 }, audio: false });
    webcamVideo = document.createElement('video');
    webcamVideo.srcObject = webcamStream;
    webcamVideo.setAttribute('playsinline', '');
    webcamVideo.muted = true;
    await webcamVideo.play();
  } catch (_) {
    // Webcam not available — face recognition silently disabled
    webcamStream = null;
    webcamVideo = null;
  }
}

async function captureAndRecognizeFace() {
  if (!webcamVideo || !webcamStream || Date.now() < _faceRecogCooldownUntil) return null;
  _faceRecogCooldownUntil = Date.now() + 5000;  // 5s cooldown between recognitions
  try {
    const canvas = document.createElement('canvas');
    canvas.width = webcamVideo.videoWidth || 320;
    canvas.height = webcamVideo.videoHeight || 240;
    canvas.getContext('2d').drawImage(webcamVideo, 0, 0, canvas.width, canvas.height);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
    if (!blob) return null;
    const resp = await fetch(`${SERVER}/face/recognize`, {
      method: 'POST',
      body: blob,
      headers: { 'X-API-Key': API_KEY, 'Content-Type': 'image/jpeg' },
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    const faces = data.faces || [];
    if (faces.length > 0) {
      lastRecognizedName = faces[0].name;
      return lastRecognizedName;
    }
  } catch (_) {}
  return null;
}

async function testMic() {
  let testStream = null;
  try {
    testStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const testCtx  = new AudioContext();
    const src      = testCtx.createMediaStreamSource(testStream);
    const analyser = testCtx.createAnalyser();
    analyser.fftSize = 2048;
    src.connect(analyser);

    // Sample energy for 1.5 seconds
    const buf = new Float32Array(analyser.fftSize);
    let maxRms = 0;
    await new Promise(resolve => {
      let ticks = 0;
      const id = setInterval(() => {
        analyser.getFloatTimeDomainData(buf);
        let s = 0;
        for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
        maxRms = Math.max(maxRms, Math.sqrt(s / buf.length));
        if (++ticks >= 5) { clearInterval(id); resolve(); }
      }, 100);
    });

    await testCtx.close();
    console.log('[Nova] Mic test maxRms:', maxRms);
    // maxRms > 0.0001 means we're getting real audio (even quiet room noise)
    return maxRms > 0.0001;
  } catch (e) {
    console.error('[Nova] Mic test failed:', e);
    return false;
  } finally {
    testStream?.getTracks().forEach(t => t.stop());
  }
}

// ── Auto-boot — avatar loads immediately on page open ───────────────────────
// The tap gate is hidden by default. AudioContext is created immediately;
// on kiosk/trusted browsers it starts 'running' (fully hands-free).
// On strict browsers (desktop Chrome) it starts 'suspended' — a small
// banner prompts the first touch to unlock audio, then disappears.
// 1-sample silent WAV (data URI) — used to nudge autoplay policy
const _SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';

async function _tryUnlockAudio(ctx) {
  if (ctx.state === 'running') return true;

  // Wrap all attempts in a 3-second timeout so a stalled play() or resume()
  // can never block initHead() on refresh.
  const _t = ms => new Promise(r => setTimeout(r, ms));
  const _race = (p) => Promise.race([p, _t(800).then(() => {})]);

  // Attempt A: direct resume (works on Android/kiosk where policy is relaxed)
  try { await _race(ctx.resume()); } catch (_) {}
  if (ctx.state === 'running') return true;

  // Attempt B: silent one-sample BufferSource (classic WebAudio unlock trick)
  try {
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    await _race(ctx.resume());
  } catch (_) {}
  if (ctx.state === 'running') return true;

  // Attempt C: muted HTMLAudioElement — some browsers allow muted autoplay
  // which can ungate the AudioContext. Capped at 1 s to avoid hanging on refresh.
  try {
    const a = document.createElement('audio');
    a.src = _SILENT_WAV; a.volume = 0; a.muted = true;
    await _race(a.play().catch(() => {}));
    await _race(ctx.resume());
  } catch (_) {}
  if (ctx.state === 'running') return true;

  // Attempt D: short pause then one final retry
  await _t(150);
  try { await _race(ctx.resume()); } catch (_) {}
  return ctx.state === 'running';
}

(async () => {

// ── Avatar error helper ──────────────────────────────────────────────────────
function _avatarErrorMsg(e) {
  const m = e && (e.message || String(e));
  if (/Avatar object .+ not found/i.test(m)) {
    return 'Incompatible avatar skeleton. The model must use ReadyPlayerMe bone names (Armature root, Hips bone). Sketchfab and generic GLB files are not compatible.';
  }
  if (/Blend shapes not found/i.test(m)) {
    return 'Avatar is missing face morph targets. The GLB must be exported with ARKit and Oculus Visemes blend shapes enabled.';
  }
  if (/Invalid parameter/i.test(m)) {
    return 'Invalid avatar URL or file. Check the URL is reachable and points to a valid GLB.';
  }
  return m || 'Could not load avatar.';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
async function connectWs() {
  // Try to resolve API key from admin session if not set
  if (!API_KEY) await _resolveApiKey();

  let wsUrl = WS_BASE;
  try {
    // Send with credentials so HttpOnly cookie is included as fallback
    const headers = {};
    if (API_KEY) headers['X-API-Key'] = API_KEY;
    const r = await fetch(`${SERVER}/ws/token`, {
      method: 'POST',
      headers,
      credentials: 'include',
    });
    if (!r.ok) {
      if (r.status === 401) {
        // Try admin session to get API key and set cookie
        await _resolveApiKey();
        if (API_KEY) {
          // Set the HttpOnly cookie for future reconnects
          fetch(SERVER + '/auth/set-cookie', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({api_key:API_KEY}), credentials:'include'}).catch(()=>{});
          setTimeout(connectWs, 1000);
          return;
        }
        setStatus('Not authenticated — open /admin/login first, or add ?api_key= to the URL', '');
        return;
      }
      setStatus('Reconnecting…', '');
      _startReconnectCountdown(reconnectDelay);
      setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 2, 30000); connectWs(); }, reconnectDelay);
      return;
    }
    const d = await r.json();
    if (!d?.token) {
      setStatus('Reconnecting…', '');
      _startReconnectCountdown(reconnectDelay);
      setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 2, 30000); connectWs(); }, reconnectDelay);
      return;
    }
    wsUrl += `&token=${encodeURIComponent(d.token)}`;
  } catch (_) {
    // Backend unreachable (still booting after restart) — keep retrying
    setStatus('Reconnecting…', '');
    _startReconnectCountdown(reconnectDelay);
    setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 2, 30000); connectWs(); }, reconnectDelay);
    return;
  }
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    wsReady = true; reconnectDelay = 1000;
    _clearReconnectCountdown();
    $btnMic.disabled = false;
    setStatus('Connected', '');
    if (ROOM) {
      const rb = document.getElementById('roomBadge');
      if (rb) { rb.textContent = ROOM.replace(/_/g,' '); rb.style.display = 'inline'; }
    }
    ws.send(JSON.stringify({
      type: 'client_capabilities',
      output_streaming: false,
      output_audio_format: 'wav',
      client_metadata: _avatarClientMetadata(),
      ...(ROOM ? { room_id: ROOM } : {}),
    }));
    startWakeWord();
  };

  ws.onmessage = async (evt) => {
    if (evt.data instanceof ArrayBuffer) {
      if (activeOutputStream?.turnId != null) {
        if (activeOutputStream.audioFormat === 'pcm_s16le') {
          await queueProgressivePcmChunk(evt.data, activeOutputStream);
        } else {
          activeOutputStream.chunks.push(evt.data);
        }
        return;
      }
      await playWav(evt.data);
      return;
    }
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'server_restarted' && !handledServerRestart) {
        handledServerRestart = true;
        setStatus('Server restarted. Reloading…', '');
        setTimeout(() => window.location.reload(), 250);
        return;
      }
      if (msg.type === 'voice_capabilities') serverVoiceCapabilities = { ...serverVoiceCapabilities, ...msg };
      if (msg.type === 'state' || msg.type === 'avatar_state') handleState(msg.state);
      if (msg.type === 'surface_state') applySurfaceState(msg);
      if (msg.type === 'turn_interrupted') handleTurnInterrupted(msg);
      if (msg.type === 'turn_context_ack') {
        if (msg.event_id) activeEventId = msg.event_id;
        pendingTurnContext = null;
      }
      if (msg.type === 'transcript')  showSub('You: ' + msg.text);
      if (msg.type === 'response') {
        showSub('Nova: ' + msg.text);
        lastResponseWasQuestion = /[\u003f]\s*$/.test((msg.text || '').trim());
        // Set avatar mood based on response sentiment
        if (head) try { head.setMood(_detectSentiment(msg.text)); } catch(_) {}
      }
      if (msg.type === 'audio_start') pendingAudioTurnId = msg.turn_id ?? null;
      if (msg.type === 'output_audio_start') {
        pendingAudioTurnId = msg.turn_id ?? null;
        activeOutputStream = {
          turnId: msg.turn_id ?? null,
          audioFormat: msg.audio_format || 'wav',
          sampleRate: msg.sample_rate || 22050,
          channels: msg.channels || 1,
          sampleWidthBytes: msg.sample_width_bytes || 2,
          frameOffset: 0,
          headBufferedChunks: [],
          headBufferedFrames: 0,
          headBufferedStartFrame: 0,
          chunks: [],
        };
        if (activeOutputStream.audioFormat === 'pcm_s16le') {
          currentPlaybackTurnId = activeOutputStream.turnId;
          if (!audioCtx) audioCtx = new AudioContext();
          if (audioCtx.state === 'suspended') await audioCtx.resume();
          progressivePlaybackCursor = Math.max(audioCtx.currentTime + 0.02, progressivePlaybackCursor || 0);
        }
      }
      if (msg.type === 'output_audio_end') {
        if (activeOutputStream?.turnId === (msg.turn_id ?? null) &&
            activeOutputStream.audioFormat === 'wav' &&
            activeOutputStream.chunks.length) {
          const blob = new Blob(activeOutputStream.chunks, { type: 'audio/wav' });
          const buffer = await blob.arrayBuffer();
          activeOutputStream = null;
          await playWav(buffer);
        } else {
          if (activeOutputStream?.audioFormat === 'pcm_s16le' &&
              pendingWordTimingsTurnId === (msg.turn_id ?? null)) {
            if (head && typeof head.speakAudio === 'function') {
              flushHeadProgressiveBuffer(activeOutputStream, true);
            }
            pendingWordTimings = null;
            pendingWordTimingsTurnId = null;
          }
          activeOutputStream = null;
        }
      }
      if (msg.type === 'word_timings') {
        if (msg.append && Array.isArray(pendingWordTimings) && (pendingWordTimingsTurnId === (msg.turn_id ?? null))) {
          pendingWordTimings = pendingWordTimings.concat(msg.word_timings || []);
        } else {
          pendingWordTimings = msg.word_timings;
        }
        pendingWordTimingsTurnId = msg.turn_id ?? null;
      }
      if (msg.type === 'announce') {
        showSub('Nova: ' + msg.text);
        if (msg.word_timings) {
          pendingWordTimings = msg.word_timings;
          pendingWordTimingsTurnId = null;
        }
        // Announcements are system-initiated — don't auto-mic on them
        lastResponseWasQuestion = false;
      }
      if (msg.type === 'visual_event') showVisualEvent(msg);
    } catch (_) {}
  };

  ws.onclose = (evt) => {
    wsReady = false; $btnMic.disabled = true;
    stopWakeWord(); stopRecording(false);
    if (evt && evt.code === 1008) {
      // Auth failed — try re-resolving API key then retry once
      setStatus('Re-authenticating…', '');
      _resolveApiKey().then(() => {
        if (API_KEY) { setTimeout(connectWs, 2000); }
        else { setStatus('Avatar auth failed — reload page', ''); }
      });
      return;
    }
    setStatus('Reconnecting…', '');
    _startReconnectCountdown(reconnectDelay);
    setTimeout(() => { reconnectDelay = Math.min(reconnectDelay * 1.5, 10000); connectWs(); }, reconnectDelay);
  };
  ws.onerror = () => ws.close();
  // Single persistent ping interval — clear any previous one before creating
  if (_pingInterval) { clearInterval(_pingInterval); }
  _pingInterval = setInterval(() => { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'ping'})); }, 25000);
}

// ── State handler ─────────────────────────────────────────────────────────────
function handleState(state) {
  if (!state) return;
  $ring.className = state;
  if (head) try { head.setMood({idle:'neutral',listening:'happy',thinking:'neutral',speaking:'happy',alert:'angry',error:'sad'}[state]||'neutral'); } catch(_){}

  if (state === 'idle') {
    const wasBusy = isBusy;
    isBusy = false;
    if (!recording && wsReady) {
      if (lastResponseWasQuestion) {
        lastResponseWasQuestion = false;
        setStatus('Listening for your reply…', 'dot-recding');
        holdMode = false;
        stopWakeWord();
        setTimeout(startRecording, 400);
      } else {
        wakeSupported ? setStatus('Say "Nova" to talk', 'dot-waking') : setStatus('Ready', 'dot-online');
        // Delay wake word restart after speaking to avoid echo false-triggers
        const delay = wasBusy ? 1500 : 300;
        if (!wakeActive && !wakeVadActive) setTimeout(startWakeWord, delay);
        else restartWakeWordListener(delay);
      }
    }
  } else if (state === 'thinking') {
    isBusy = true; setStatus('Thinking…', 'dot-online');
  } else if (state === 'speaking') {
    isBusy = true; setStatus('Speaking…', 'dot-online');
  } else if (state === 'listening') {
    setStatus('Listening…', 'dot-recding');
  }
}

// ── Wake word recovery watchdog ────────────────────────────────────────────────
// Detects when wake word has silently died (all flags look idle but no listener
// is active) and restarts it. This catches all edge cases: stuck isBusy, stuck
// wakeVadChecking, getUserMedia failures, SR zombie states, etc.
let _wakeWatchdog = null;
function _startWakeWatchdog() {
  if (_wakeWatchdog) return;
  _wakeWatchdog = setInterval(() => {
    if (!wsReady) return;
    if (recording || isBusy) return;
    if (wakeActive || wakeVadActive) return;
    // Wake word should be running but isn't — force restart
    console.warn('[Nova] Wake watchdog: listener dead, restarting');
    // Clear any stuck flags
    wakeVadChecking = false;
    wakeVadCooldown = false;
    wakeTriggered = false;
    startWakeWord();
  }, 10000);
}
// Start watchdog once WS is ready
const _origHandleState = handleState;
handleState = function(state) {
  _origHandleState(state);
  if (wsReady && !_wakeWatchdog) _startWakeWatchdog();
};

function stopActiveSpeechPlayback() {
  pendingWordTimings = null;
  pendingWordTimingsTurnId = null;
  pendingAudioTurnId = null;
  currentPlaybackTurnId = null;
  activeOutputStream = null;
  progressivePlaybackCursor = 0;
  progressiveHeadSegments = [];
  progressiveHeadDrainPromise = null;
  for (const src of progressivePlaybackSources) {
    try { src.stop(); } catch (_) {}
    try { src.disconnect(); } catch (_) {}
  }
  progressivePlaybackSources = [];
  if (currentPlaybackSource) {
    try { currentPlaybackSource.stop(); } catch (_) {}
    try { currentPlaybackSource.disconnect(); } catch (_) {}
    currentPlaybackSource = null;
  }
  if (head) {
    try {
      const stopFn = head.stopSpeaking || head.stopAudio || head.stop;
      if (typeof stopFn === 'function') stopFn.call(head);
    } catch (_) {}
  }
}

function handleTurnInterrupted(msg) {
  if (msg?.interrupted_turn_id != null && currentPlaybackTurnId != null && msg.interrupted_turn_id !== currentPlaybackTurnId) {
    pendingWordTimings = null;
    if (pendingWordTimingsTurnId === msg.interrupted_turn_id) pendingWordTimingsTurnId = null;
    if (pendingAudioTurnId === msg.interrupted_turn_id) pendingAudioTurnId = null;
    if (activeOutputStream?.turnId === msg.interrupted_turn_id) {
      activeOutputStream = null;
      progressivePlaybackCursor = 0;
      progressiveHeadSegments = [];
      progressiveHeadDrainPromise = null;
      for (const src of progressivePlaybackSources) {
        try { src.stop(); } catch (_) {}
        try { src.disconnect(); } catch (_) {}
      }
      progressivePlaybackSources = [];
    }
    return;
  }
  stopActiveSpeechPlayback();
  isBusy = false;
  handleState('idle');
}

function buildAudioBufferFromPcm(chunkBuffer, streamInfo) {
  const pcm16 = new Int16Array(chunkBuffer);
  const frameCount = Math.floor(pcm16.length / streamInfo.channels);
  if (!frameCount) return null;
  const audioBuffer = audioCtx.createBuffer(streamInfo.channels, frameCount, streamInfo.sampleRate);
  for (let channel = 0; channel < streamInfo.channels; channel++) {
    const channelData = audioBuffer.getChannelData(channel);
    for (let i = 0; i < frameCount; i++) {
      const sample = pcm16[i * streamInfo.channels + channel] || 0;
      channelData[i] = sample / 32768;
    }
  }
  return { audioBuffer, frameCount };
}

function concatPcmChunks(chunks) {
  const totalLength = chunks.reduce((sum, chunk) => sum + chunk.byteLength, 0);
  const merged = new Uint8Array(totalLength);
  let offset = 0;
  for (const chunk of chunks) {
    merged.set(chunk, offset);
    offset += chunk.byteLength;
  }
  return merged.buffer;
}

function consumeSegmentWordTimings(segmentStartMs, segmentEndMs, turnId) {
  if (!pendingWordTimings || !pendingWordTimings.length) return null;
  if (pendingWordTimingsTurnId !== null && pendingWordTimingsTurnId !== turnId) return null;
  return pendingWordTimings
    .filter(t => t.end_ms > segmentStartMs && t.start_ms < segmentEndMs)
    .map(t => ({
      word: t.word,
      start_ms: Math.max(0, t.start_ms - segmentStartMs),
      end_ms: Math.max(0, Math.min(segmentEndMs, t.end_ms) - segmentStartMs),
    }))
    .filter(t => t.end_ms > t.start_ms);
}

async function playHeadProgressiveSegment(segment) {
  currentPlaybackTurnId = segment.turnId;
  if (!head || typeof head.speakAudio !== 'function') return;
  const speakOpts = { audio: segment.audio };
  if (segment.wordTimings?.length) {
    speakOpts.words = segment.wordTimings.map(t => t.word);
    speakOpts.wtimes = segment.wordTimings.map(t => t.start_ms);
    speakOpts.wdurations = segment.wordTimings.map(t => t.end_ms - t.start_ms);
  }
  const maybePromise = head.speakAudio(speakOpts);
  if (maybePromise && typeof maybePromise.then === 'function') {
    try {
      await Promise.race([
        maybePromise,
        new Promise(resolve => setTimeout(resolve, Math.max(0, (segment.audio.duration * 1000) - 30))),
      ]);
      return;
    } catch (_) {}
  }
  await new Promise(resolve => setTimeout(resolve, Math.max(0, (segment.audio.duration * 1000) - 30)));
}

async function drainHeadProgressiveSegments() {
  if (progressiveHeadDrainPromise) return progressiveHeadDrainPromise;
  progressiveHeadDrainPromise = (async () => {
    while (progressiveHeadSegments.length) {
      const segment = progressiveHeadSegments.shift();
      if (!segment) continue;
      await playHeadProgressiveSegment(segment);
      if (!progressiveHeadSegments.length && !activeOutputStream) {
        currentPlaybackTurnId = null;
      }
    }
  })();
  try {
    await progressiveHeadDrainPromise;
  } finally {
    progressiveHeadDrainPromise = null;
  }
}

function flushHeadProgressiveBuffer(streamInfo, force = false) {
  if (!streamInfo?.headBufferedChunks?.length || !streamInfo.sampleRate) return false;
  const bufferedMs = (streamInfo.headBufferedFrames / streamInfo.sampleRate) * 1000;
  if (!force && bufferedMs < HEAD_PROGRESSIVE_SEGMENT_MS) return false;
  const mergedBuffer = concatPcmChunks(streamInfo.headBufferedChunks);
  const built = buildAudioBufferFromPcm(mergedBuffer, streamInfo);
  if (!built) {
    streamInfo.headBufferedChunks = [];
    streamInfo.headBufferedFrames = 0;
    streamInfo.headBufferedStartFrame = streamInfo.frameOffset;
    return false;
  }
  const segmentStartMs = (streamInfo.headBufferedStartFrame / streamInfo.sampleRate) * 1000;
  const segmentEndMs = ((streamInfo.headBufferedStartFrame + streamInfo.headBufferedFrames) / streamInfo.sampleRate) * 1000;
  progressiveHeadSegments.push({
    turnId: streamInfo.turnId,
    audio: built.audioBuffer,
    wordTimings: consumeSegmentWordTimings(segmentStartMs, segmentEndMs, streamInfo.turnId),
  });
  streamInfo.headBufferedChunks = [];
  streamInfo.headBufferedFrames = 0;
  streamInfo.headBufferedStartFrame = streamInfo.frameOffset;
  void drainHeadProgressiveSegments();
  return true;
}

async function queueProgressivePcmChunk(chunkBuffer, streamInfo) {
  try {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const built = buildAudioBufferFromPcm(chunkBuffer, streamInfo);
    if (!built) return;
    const { audioBuffer, frameCount } = built;
    streamInfo.frameOffset += frameCount;
    if (head && typeof head.speakAudio === 'function') {
      if (!streamInfo.headBufferedChunks.length) {
        streamInfo.headBufferedStartFrame = streamInfo.frameOffset - frameCount;
      }
      streamInfo.headBufferedChunks.push(new Uint8Array(chunkBuffer.slice(0)));
      streamInfo.headBufferedFrames += frameCount;
      flushHeadProgressiveBuffer(streamInfo, false);
      return;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuffer;
    src.connect(audioCtx.destination);
    const startAt = Math.max(audioCtx.currentTime + 0.02, progressivePlaybackCursor || 0);
    progressivePlaybackCursor = startAt + audioBuffer.duration;
    currentPlaybackSource = src;
    progressivePlaybackSources.push(src);
    src.onended = () => {
      progressivePlaybackSources = progressivePlaybackSources.filter(item => item !== src);
      if (currentPlaybackSource === src) currentPlaybackSource = null;
      if (!progressivePlaybackSources.length) currentPlaybackTurnId = null;
    };
    src.start(startAt);
  } catch (e) {
    console.error('[Nova] Progressive PCM playback:', e);
  }
}

// ── Wake word ─────────────────────────────────────────────────────────────────
function _clearWakeVadFallback() {
  if (wakeVadFallbackTimer) { clearTimeout(wakeVadFallbackTimer); wakeVadFallbackTimer = null; }
}

function _clearWakeVadHealthTimer() {
  if (wakeVadHealthTimer) { clearTimeout(wakeVadHealthTimer); wakeVadHealthTimer = null; }
}

function _resetWakeVadCounters() {
  wakeVadFalseChecks = 0;
  wakeVadEmptyChecks = 0;
}

function restartWakeWordListener(delayMs = 300) {
  stopWakeWord();
  if (wsReady && !recording && !isBusy) setTimeout(startWakeWord, delayMs);
}

function startWakeWord() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { startWakeWordVAD(); return; }   // No SR at all — go straight to VAD
  if (wakeVadActive) return;                  // VAD already running — don't stack SR on top
  if (wakeActive || recording || wakeTriggered || isBusy || !wsReady) return;

  wakeSupported = true; wakeActive = true;
  $pill.classList.add('on');
  setStatus('Say "Nova" to talk', 'dot-waking');
  $btnMic.textContent = '🎙 Or Hold to Talk';

  const rec = new SR();
  wakeRec = rec;
  rec.continuous = false; rec.interimResults = true;
  rec.lang = 'en-US'; rec.maxAlternatives = 1;

  rec.onstart = () => {
    // SR fired onstart but may never produce results (FKB zombie SR).
    // If no result arrives within 5 s, kill SR and fall back to VAD.
    _clearWakeVadFallback();
    wakeVadFallbackTimer = setTimeout(() => {
      wakeVadFallbackTimer = null;
      if (wakeActive && !wakeTriggered && !wakeVadActive) {
        try { rec.stop(); } catch (_) {}
        wakeActive = false; wakeRec = null;
        startWakeWordVAD();
      }
    }, 5000);
  };

  rec.onresult = (e) => {
    _clearWakeVadFallback();  // SR is alive — cancel fallback
    let txt = '';
    for (let i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;
    if (txt.toLowerCase().includes('nova')) { wakeTriggered = true; rec.abort(); }
  };

  rec.onend = () => {
    _clearWakeVadFallback();
    wakeActive = false; wakeRec = null;
    if (wakeTriggered) { wakeTriggered = false; onWakeWord(); }
    else if (wsReady && !recording && !isBusy) setTimeout(startWakeWord, 300);
  };

  rec.onerror = (e) => {
    _clearWakeVadFallback();
    wakeActive = false; wakeRec = null;
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      // SR exists but non-functional — fall back to VAD.
      startWakeWordVAD();
      return;
    }
    if (wsReady && !recording && !isBusy) setTimeout(startWakeWord, 500);
  };

  try { rec.start(); } catch (_) { wakeActive = false; wakeRec = null; }
}

function stopWakeWord() {
  wakeActive = false; wakeTriggered = false;
  $pill.classList.remove('on');
  if (wakeRec) { try { wakeRec.abort(); } catch(_){} wakeRec = null; }
  stopWakeWordVAD();
}

// ── VAD-based wake word (server-side Whisper check — works in FKB/WebView) ───
async function startWakeWordVAD() {
  if (wakeVadActive || recording || isBusy || !wsReady) return;

  try {
    wakeVadStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
      video: false,
    });
  } catch (e) { return; }

  wakeVadActive = true;
  wakeSupported = true;
  _resetWakeVadCounters();
  _clearWakeVadHealthTimer();
  wakeVadHealthTimer = setTimeout(() => {
    if (wakeVadActive && !wakeVadChecking && !recording && !isBusy) restartWakeWordListener(150);
  }, 90000);
  $pill.classList.add('on');
  setStatus('Say "Nova" to talk', 'dot-waking');
  $btnMic.textContent = '🎙 Or Hold to Talk';

  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === "suspended") await audioCtx.resume();
  if (_wakeAnalyser) { try { _wakeAnalyser.disconnect(); } catch(_){} _wakeAnalyser = null; }
  if (_wakeSrc)      { try { _wakeSrc.disconnect();      } catch(_){} _wakeSrc = null; }
  _wakeAnalyser = audioCtx.createAnalyser();
  _wakeAnalyser.fftSize = 1024;
  _wakeSrc = audioCtx.createMediaStreamSource(wakeVadStream);
  _wakeSrc.connect(_wakeAnalyser);
  const wakeAnalyser = _wakeAnalyser;
  const wakeBuf = new Float32Array(wakeAnalyser.fftSize);

  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','']
    .find(m => !m || MediaRecorder.isTypeSupported(m)) || '';

  // ── Rolling-buffer approach ───────────────────────────────────────────────
  // A single continuous MediaRecorder fires every 200 ms. We keep the last
  // ROLL_SIZE slices (~2 s) in a rolling buffer.  When speech energy is
  // detected we POST the full buffer to the server so "Nova" is always
  // captured regardless of where it falls within the window.
  const ROLL_SIZE = 10;          // 10 × 200 ms = 2 s
  const rollingChunks = [];
  let headerChunk = null;        // First MediaRecorder chunk carries WebM headers
  let hasSpeech = false;
  let speechEnergyCount = 0;    // Require consecutive energy samples before flagging speech
  let wakeVadMr = null;

  // Energy sampler — debounced to avoid single-spike false triggers
  const energyTimer = setInterval(() => {
    if (!wakeVadActive) { clearInterval(energyTimer); return; }
    wakeAnalyser.getFloatTimeDomainData(wakeBuf);
    let s = 0;
    for (let i = 0; i < wakeBuf.length; i++) s += wakeBuf[i] * wakeBuf[i];
    if (Math.sqrt(s / wakeBuf.length) > VAD_THRESHOLD) {
      speechEnergyCount++;
      if (speechEnergyCount >= WAKE_VAD_SPEECH_DEBOUNCE) hasSpeech = true;
    } else {
      speechEnergyCount = 0;
    }
  }, 80);

  wakeVadMr = new MediaRecorder(wakeVadStream, mimeType ? { mimeType } : {});

  wakeVadMr.ondataavailable = async (e) => {
    if (!e.data || e.data.size === 0 || !wakeVadActive) return;

    // The very first chunk is the WebM init/header segment — keep it separate.
    if (!headerChunk) { if (e.data.size < 32) return; // too small to be a valid EBML header
    headerChunk = e.data; return; }

    rollingChunks.push(e.data);
    if (rollingChunks.length > ROLL_SIZE) rollingChunks.shift();

    // Only fire a check when energy was detected, we have enough audio,
    // and no check is already in-flight.
    if (!hasSpeech || wakeVadChecking || wakeVadCooldown || recording || isBusy) return;
    if (rollingChunks.length < WAKE_VAD_MIN_ROLLING_CHUNKS) return;

    hasSpeech = false;
    speechEnergyCount = 0;
    wakeVadChecking = true;
    setStatus('Heard you…', 'dot-waking');

    // header + rolling buffer = a complete, decodable WebM clip
    const blob = new Blob([headerChunk, ...rollingChunks],
                          { type: wakeVadMr.mimeType || 'audio/webm' });
    let wakeConfirmed = false;
    try {
      const res = await fetch(
        `${SERVER}/stt/wake`,
        { method: 'POST', body: await blob.arrayBuffer(),
          headers: { 'Content-Type': 'application/octet-stream', 'X-API-Key': API_KEY } }
      );
      if (res.ok) {
        const data = await res.json();
        wakeConfirmed = !!data.wake;
        const transcript = String(data.transcript || '').trim();
        const method = String(data.method || '').trim();
        if (wakeConfirmed) {
          _resetWakeVadCounters();
        } else {
          // Pre-filter stages (coral, verifier, numpy) return no transcript —
          // don't count those as "empty" checks since they're valid fast rejections.
          const isPreFilter = method === 'coral' || method === 'tflite_cpu'
            || method === 'numpy_classifier' || method === 'verifier';
          if (!isPreFilter) {
            wakeVadFalseChecks += 1;
            if (!transcript) wakeVadEmptyChecks += 1;
            else wakeVadEmptyChecks = 0;
          }
          // Pre-filter rejections don't count toward the restart limit
        }
      }
    } catch (_) {}

    if (wakeConfirmed && wakeVadActive && !recording && !isBusy) {
      clearInterval(energyTimer);
      stopWakeWordVAD();
      onWakeWord();
      return;
    }

    if (wakeVadActive) {
      setStatus('Say "Nova" to talk', 'dot-waking');
      wakeVadCooldown = true;
      setTimeout(() => { wakeVadCooldown = false; }, WAKE_VAD_FALSE_CHECK_COOLDOWN_MS);
      if (wakeVadFalseChecks >= 12 || wakeVadEmptyChecks >= 8) {
        clearInterval(energyTimer);
        restartWakeWordListener(150);
        wakeVadChecking = false;
        return;
      }
    }
    wakeVadChecking = false;
  };

  wakeVadMr.start(200);   // continuous — fires ondataavailable every 200 ms
}

function stopWakeWordVAD() {
  wakeVadActive = false;
  wakeVadChecking = false;
  wakeVadCooldown = false;
  _resetWakeVadCounters();
  _clearWakeVadHealthTimer();
  if (_wakeSrc)      { try { _wakeSrc.disconnect();      } catch(_){} _wakeSrc = null; }
  if (_wakeAnalyser) { try { _wakeAnalyser.disconnect();  } catch(_){} _wakeAnalyser = null; }
  if (wakeVadStream) {
    wakeVadStream.getTracks().forEach(t => t.stop());
    wakeVadStream = null;
  }
  if (!wakeActive) $pill.classList.remove('on');
}

function onWakeWord() {
  $flash.classList.add('on');
  setTimeout(() => $flash.classList.remove('on'), 280);
  showSub('Nova activated — speak now');
  holdMode = false;
  startRecording();
}

// ── Recording (MediaRecorder + AnalyserNode VAD) ──────────────────────────────
async function startRecording() {
  if (recording || !wsReady) return;
  recording = true; mediaChunks = []; speechSeen = false; silenceStart = null;

  // Fire face recognition in parallel with recording (non-blocking)
  _pendingFaceRecog = captureAndRecognizeFace();

  $btnMic.classList.add('rec');
  $btnMic.textContent = '⏺ Recording…';
  $ew.classList.add('on');
  $waveCanvas.classList.add('on');

  // Resume AudioContext (may have been suspended)
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false,
    });
  } catch (err) {
    console.error('[Nova] Mic denied:', err);
    recording = false;
    $btnMic.classList.remove('rec');
    $btnMic.textContent = wakeSupported ? '🎙 Or Hold to Talk' : '🎙 Hold to Talk';
    $ew.classList.remove('on');
    $waveCanvas.classList.remove('on');
    showSub('Microphone access denied');
    if (wakeSupported) setTimeout(startWakeWord, 1000);
    return;
  }

  // ── MediaRecorder: captures native audio (webm/ogg) ──
  const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg', '']
    .find(m => !m || MediaRecorder.isTypeSupported(m)) || '';
  mediaRec = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  mediaRec.ondataavailable = (e) => { if (e.data.size > 0) mediaChunks.push(e.data); };
  mediaRec.onstop = sendAudio;
  mediaRec.start(100);   // collect chunks every 100 ms

  console.log('[Nova] Recording started, mimeType:', mediaRec.mimeType);

  // ── AnalyserNode: reads energy for VAD (doesn't affect MediaRecorder) ──
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  _micSrcNode = audioCtx.createMediaStreamSource(micStream);
  _micSrcNode.connect(analyser);
  // Do NOT connect analyser to destination — no speaker feedback

  const timeDomain = new Float32Array(analyser.fftSize);

  if (!holdMode) {
    // VAD auto-stop for wake-word-triggered recordings
    maxTimer = setTimeout(() => { if (recording) stopRecording(true); }, VAD_MAX_MS);

    vadInterval = setInterval(() => {
      if (!recording) { clearInterval(vadInterval); return; }
      analyser.getFloatTimeDomainData(timeDomain);
      let sum = 0;
      for (let i = 0; i < timeDomain.length; i++) sum += timeDomain[i] * timeDomain[i];
      const rms = Math.sqrt(sum / timeDomain.length);

      // Update energy bar + waveform
      $ef.style.width = Math.min(100, (rms / 0.05) * 100) + '%';
      $ef.className = rms > VAD_THRESHOLD ? 'speaking' : '';
      _drawWaveform(timeDomain, rms);

      if (rms > VAD_THRESHOLD) {
        speechSeen = true; silenceStart = null;
        setStatus('Speaking…', 'dot-speech');
      } else if (speechSeen) {
        if (!silenceStart) silenceStart = Date.now();
        if (Date.now() - silenceStart > VAD_SILENCE_MS) stopRecording(true);
      }
    }, 80);
  }
}

function stopRecording(send) {
  if (!recording) return;
  recording = false;

  clearInterval(vadInterval); vadInterval = null;
  clearTimeout(maxTimer);     maxTimer    = null;

  $btnMic.classList.remove('rec');
  $btnMic.textContent = wakeSupported ? '🎙 Or Hold to Talk' : '🎙 Hold to Talk';
  $ew.classList.remove('on');
  $waveCanvas.classList.remove('on');
  $ef.style.width = '0%';

  if (mediaRec && mediaRec.state !== 'inactive') {
    if (!send) mediaRec.ondataavailable = null;   // discard
    mediaRec.stop();
  } else {
    if (send) sendAudio();
  }

  if (_micSrcNode) { try { _micSrcNode.disconnect(); } catch(_){} _micSrcNode = null; }
  if (analyser)    { try { analyser.disconnect();    } catch(_){} analyser = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (!send && wakeSupported) setTimeout(startWakeWord, 400);
}

async function sendAudio() {
  if (!wsReady || mediaChunks.length === 0) {
    if (wakeSupported) setTimeout(startWakeWord, 400);
    return;
  }

  // Check minimum duration
  const totalBytes = mediaChunks.reduce((n, c) => n + c.size, 0);
  if (totalBytes < 1000) {
    console.log('[Nova] Audio too short, discarding');
    if (wakeSupported) setTimeout(startWakeWord, 400);
    return;
  }

  const blob   = new Blob(mediaChunks, { type: mediaRec?.mimeType || 'audio/webm' });
  const buffer = await blob.arrayBuffer();
  console.log('[Nova] Sending', buffer.byteLength, 'bytes, type:', blob.type);
  if (ws?.readyState === WebSocket.OPEN) {
    // Resolve face recognition (started at recording begin, should be done by now)
    let speakerName = null;
    if (_pendingFaceRecog) {
      try { speakerName = await Promise.race([_pendingFaceRecog, new Promise(r => setTimeout(() => r(null), 500))]); } catch (_) {}
      _pendingFaceRecog = null;
    }
    if (speakerName) lastRecognizedName = speakerName;
    const turnContext = pendingTurnContext || (activeEventId ? { event_id: activeEventId } : null);
    const effectiveName = speakerName || lastRecognizedName;
    if (turnContext || effectiveName) {
      ws.send(JSON.stringify({ type: 'turn_context', ...(turnContext || {}), ...(effectiveName ? { speaker_name: effectiveName } : {}), ...(ROOM ? { room_id: ROOM } : {}) }));
    }
  }
  ws.send(buffer);
  setStatus('Processing…', 'dot-online');
  // Wake word resumes when server sends idle state
}

// ── WAV playback ──────────────────────────────────────────────────────────────
async function playWav(wavBuffer) {
  try {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const ab = await audioCtx.decodeAudioData(wavBuffer.slice(0));
    if (currentPlaybackSource) {
      try { currentPlaybackSource.stop(); } catch (_) {}
      try { currentPlaybackSource.disconnect(); } catch (_) {}
      currentPlaybackSource = null;
    }
    currentPlaybackTurnId = pendingAudioTurnId;
    if (head) {
      // Consume pending word timings — converts server format to TalkingHead format
      // matching the TalkMateAI approach: words / wtimes / wdurations arrays
      const speakOpts = { audio: ab };
      if (pendingWordTimings && pendingWordTimings.length &&
          (pendingWordTimingsTurnId === null || pendingWordTimingsTurnId === currentPlaybackTurnId)) {
        speakOpts.words      = pendingWordTimings.map(t => t.word);
        speakOpts.wtimes     = pendingWordTimings.map(t => t.start_ms);
        speakOpts.wdurations = pendingWordTimings.map(t => t.end_ms - t.start_ms);
      }
      pendingWordTimings = null;
      pendingWordTimingsTurnId = null;
      pendingAudioTurnId = null;
      head.speakAudio(speakOpts);
    } else {
      const src = audioCtx.createBufferSource();
      currentPlaybackSource = src;
      src.onended = () => {
        if (currentPlaybackSource === src) {
          currentPlaybackSource = null;
          currentPlaybackTurnId = null;
        }
      };
      src.buffer = ab; src.connect(audioCtx.destination); src.start();
      pendingWordTimings = null;
      pendingWordTimingsTurnId = null;
      pendingAudioTurnId = null;
    }
  } catch (e) { console.error('[Nova] WAV playback:', e); }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
let subTimer = null;
function showSub(text) {
  $sub.textContent = text; $sub.classList.add('on');
  clearTimeout(subTimer);
  subTimer = setTimeout(() => $sub.classList.remove('on'), 6000);
}

// ── Reconnect countdown ──────────────────────────────────────────────────────
let _reconnectCountdownId = null;
function _startReconnectCountdown(delayMs) {
  _clearReconnectCountdown();

const _SENTIMENT_MAP = [

  { mood: 'happy',   words: /\b(great|awesome|wonderful|fantastic|perfect|excellent|happy|glad|love it|sure thing|absolutely|of course)\b/i },
  { mood: 'angry',   words: /\b(warning|danger|critical|urgent|emergency|alert|immediately)\b/i },
  { mood: 'love',    words: /\b(love|heart|sweet|beautiful|miss you|care about)\b/i },

function _drawWaveform(timeDomain, rms) {

  _waveCtx.clearRect(0, 0, w, h);
  const bars = 24;
  const gap = 2;
  const barW = (w - (bars - 1) * gap) / bars;
  const step = Math.floor(timeDomain.length / bars);
  const speaking = rms > VAD_THRESHOLD;
  for (let i = 0; i < bars; i++) {
    let sum = 0;
    for (let j = 0; j < step; j++) { const v = timeDomain[i * step + j] || 0; sum += v * v; }

    const barH = Math.max(2, Math.min(h - 2, (barRms / 0.06) * h));
    const x = i * (barW + gap);
    const y = (h - barH) / 2;
    _waveCtx.fillStyle = speaking ? 'rgba(56,189,248,0.8)' : 'rgba(99,102,241,0.5)';

  }
}

  e.preventDefault();
  _spaceHeld = false;
  if (recording && holdMode) stopRecording(true);
});

_WX_ICONS['lightning-rainy'] = _WX_ICONS['lightning'];
_WX_ICONS['snowy-rainy'] = _WX_ICONS['snowy'];
_WX_ICONS['windy-variant'] = _WX_ICONS['windy'];
function _wxIcon(c) { return _WX_ICONS[c] || _WX_ICONS['cloudy']; }
function _wxLabel(c) { return (c||'').replace(/[-_]/g,' ').replace(/\b\w/g,l=>l.toUpperCase()); }

let _wcVisible = true;

function _initWeatherCard() {
  const el = document.getElementById('weather-card');
  if (!el) return;
  // Hide name badge — weather card replaces it visually
  // const badge = document.getElementById('name-badge');
  // if (badge) badge.style.display = 'none';
  _updateWcTime();
  _fetchWcData();
  setInterval(_updateWcTime, 30000);
  setInterval(_fetchWcData, 120000); // every 2 min
  // Show after a short delay (let avatar load first)
  setTimeout(() => el.classList.add('on'), 1500);
}

function _updateWcTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const el = (id) => document.getElementById(id);
  const d = el('wc-day'); if (d) d.textContent = days[now.getDay()];
  const t = el('wc-time'); if (t) t.textContent = hh + ':' + mm;
}

async function _fetchWcData() {
  try {
    const r = await fetch(SERVER + '/ambient');
    if (!r.ok) return;
    const d = await r.json();
    if (d.temperature != null) {
      const t = document.getElementById('wc-temp');
      if (t) t.innerHTML = '<span class="wc-num">' + Math.round(d.temperature) + '</span><span class="wc-degree-symbol">°</span><span class="wc-unit">C</span>';
      const tc = document.getElementById('wc-temp-chip');
      if (tc) tc.textContent = Math.round(d.temperature) + '°C';
    }
    if (d.condition) {
      const ic = document.getElementById('wc-icon');
      if (ic) ic.innerHTML = _wxIcon(d.condition);
      const temp = d.temperature || 0;
      const wind = d.wind_speed || 0;
      const feel = wind > 5 ? Math.round(temp - (wind * 0.3)) : Math.round(temp);
      const f = document.getElementById('wc-feel');
      if (f) f.innerHTML = 'Real feel <strong>' + feel + '°C</strong>';
    }
    if (d.wind_speed != null) {
      const w = document.getElementById('wc-wind');
      if (w) w.textContent = Math.round(d.wind_speed) + ' km/h';
    }
    if (d.humidity != null) {
      const h = document.getElementById('wc-humidity');
      if (h) h.textContent = Math.round(d.humidity) + '%';
    }
    // Hourly forecast
    const fcEl = document.getElementById('wc-forecast');
    const hoursEl = document.getElementById('wc-fc-hours');
    if (d.hourly && d.hourly.length && fcEl && hoursEl) {
      fcEl.style.display = '';
      hoursEl.innerHTML = d.hourly.map(h => {
        const dt = new Date(h.time);
        const hh = dt.getHours();
        const ampm = hh >= 12 ? 'PM' : 'AM';
        const h12 = hh % 12 || 12;
        const timeStr = String(h12).padStart(2,'0') + ':00 ' + ampm;
        return '<div>' +
          '<div class="wc-fc-hour-icon">' + _wxIcon(h.condition) + '</div>' +
          '<div class="wc-fc-hour-time">' + timeStr + '</div>' +
          '<div class="wc-fc-hour-temp">' + Math.round(h.temperature) + '<sup>°</sup></div>' +
          '</div>';
      }).join('');
    }
    // Tomorrow
    if (d.tomorrow) {
      const tmrwIcon = document.getElementById('wc-fc-tmrw-icon');
      const tmrwCond = document.getElementById('wc-fc-tmrw-cond');
      const tmrwTemps = document.getElementById('wc-fc-tmrw-temps');
      if (tmrwIcon) tmrwIcon.innerHTML = _wxIcon(d.tomorrow.condition);
      if (tmrwCond) tmrwCond.textContent = _wxLabel(d.tomorrow.condition);
      if (tmrwTemps) {
        const hi = d.tomorrow.temperature_high != null ? Math.round(d.tomorrow.temperature_high) : '--';
        const lo = d.tomorrow.temperature_low != null ? Math.round(d.tomorrow.temperature_low) : '--';
        tmrwTemps.innerHTML = '<span class="wc-fc-tmrw-hi">↑ ' + hi + '°</span> <span class="wc-fc-tmrw-lo">↓ ' + lo + '°</span>';
      }
    }
  } catch(_) {}
}

// Hide/show weather card when event popup appears/disappears
function _wcSyncWithPopup(popupVisible) {
  const el = document.getElementById('weather-card');
  if (!el) return;
  if (popupVisible) {
    el.classList.add('hidden-by-event');
  } else {
    el.classList.remove('hidden-by-event');
  }
}

setTimeout(_initWeatherCard, 200);

// ── Scoreboard widget ─────────────────────────────────────────────
const _medals = ['🥇','🥈','🥉'];

function _initScoreboardWidget() {
  const el = document.getElementById('scoreboard-widget');
  if (!el) return;
  _fetchScoreboardWidget();
  setInterval(_fetchScoreboardWidget, 120000);
}

async function _fetchScoreboardWidget() {
  try {
    const resp = await fetch(SERVER + '/admin/scoreboard', { credentials: 'include' });
    if (!resp.ok) return;
    const d = await resp.json();
    const el = document.getElementById('scoreboard-widget');
    const rows = document.getElementById('sb-widget-rows');
    if (!rows || !el) return;

    // Show/hide based on admin toggle
    const show = d.config && d.config.show_widget !== false;
    el.classList.toggle('on', show);

    const weekly = d.weekly || [];
    if (!weekly.length) { rows.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.4);">No scores yet</div>'; return; }

    rows.innerHTML = weekly.slice(0, 3).map((s, i) => {
      const photoUrl = SERVER + '/admin/faces/photo/' + encodeURIComponent(s.person);
      const initials = s.person.charAt(0).toUpperCase();
      return `<div class="sb-row">
        <img class="sb-avatar" src="${photoUrl}" alt="${initials}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="sb-avatar-fallback" style="display:none;">${initials}</div>
        <span class="sb-medal">${_medals[i] || '🏅'}</span>
        <span class="sb-name">${s.person.charAt(0).toUpperCase()+s.person.slice(1)}</span>
        <span class="sb-pts">${s.points}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}

setTimeout(_initScoreboardWidget, 2500);
